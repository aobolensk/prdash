<h2 class="stats-section-title">Velocity</h2>

<div class="chart-row">
    <div class="chart-container">
        <canvas id="velocityChart"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="linesChart"></canvas>
    </div>
</div>

<script type="application/json" id="velocityData">
{
    "labels": [{% for period in velocity_stats.period_data %}"{{ period.period_start|date:'M j' }}"{% if not forloop.last %}, {% endif %}{% endfor %}],
    "opened": [{% for period in velocity_stats.period_data %}{{ period.opened }}{% if not forloop.last %}, {% endif %}{% endfor %}],
    "merged": [{% for period in velocity_stats.period_data %}{{ period.merged }}{% if not forloop.last %}, {% endif %}{% endfor %}],
    "linesAdded": [{% for period in velocity_stats.period_data %}{{ period.lines_added }}{% if not forloop.last %}, {% endif %}{% endfor %}],
    "linesRemoved": [{% for period in velocity_stats.period_data %}{{ period.lines_removed }}{% if not forloop.last %}, {% endif %}{% endfor %}]
}
</script>

<div class="velocity-summary">
    <span class="summary-item">
        <strong>{{ velocity_stats.total_lines_changed|floatformat:0 }}</strong> lines changed
    </span>
    <span class="summary-item">
        <strong>{{ velocity_stats.avg_prs_per_period|floatformat:1 }}</strong> PRs/{% if velocity_stats.granularity == "day" %}day{% else %}week{% endif %} avg
    </span>
</div>
