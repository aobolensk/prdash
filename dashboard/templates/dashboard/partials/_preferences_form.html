<div class="preferences-form-wrapper">
    {% if success %}
    <div class="alert alert-success">Preferences saved!</div>
    {% endif %}

    <form hx-post="{% url 'dashboard:save_preferences' %}"
          hx-target="#preferences-form-container"
          hx-swap="innerHTML"
          class="preferences-form">
        {% csrf_token %}

        <div class="form-group">
            <label>Auto-refresh tabs</label>
            <p class="form-help">Select which tabs should automatically refresh at regular intervals.</p>
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox"
                           name="auto_refresh_my_prs"
                           {% if prefs.auto_refresh_my_prs %}checked{% endif %}>
                    <span>My PRs</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox"
                           name="auto_refresh_review_requests"
                           {% if prefs.auto_refresh_review_requests %}checked{% endif %}>
                    <span>Review Requests</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox"
                           name="auto_refresh_assigned"
                           {% if prefs.auto_refresh_assigned %}checked{% endif %}>
                    <span>Assigned</span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="auto_refresh_interval">Refresh interval</label>
            <select name="auto_refresh_interval"
                    id="auto_refresh_interval"
                    class="input select-input">
                <option value="1" {% if prefs.auto_refresh_interval == 1 %}selected{% endif %}>1 minute</option>
                <option value="2" {% if prefs.auto_refresh_interval == 2 %}selected{% endif %}>2 minutes</option>
                <option value="5" {% if prefs.auto_refresh_interval == 5 %}selected{% endif %}>5 minutes</option>
                <option value="10" {% if prefs.auto_refresh_interval == 10 %}selected{% endif %}>10 minutes</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Save Preferences</button>
    </form>
</div>
