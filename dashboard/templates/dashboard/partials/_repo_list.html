<ul class="repo-list" id="repo-list">
    {% for repo in repos %}
        <li class="repo-item">
            <label class="repo-toggle">
                <input type="checkbox"
                       {% if repo.enabled %}checked{% endif %}
                       hx-post="{% url 'dashboard:toggle_repo' repo.id %}"
                       hx-target="#repo-list"
                       hx-swap="outerHTML">
                <span class="repo-name">{{ repo.full_name }}</span>
            </label>
            <button type="button"
                    class="btn-icon repo-remove-btn"
                    aria-label="Remove repository"
                    hx-post="{% url 'dashboard:remove_repo' repo.id %}"
                    hx-target="#repo-list"
                    hx-swap="outerHTML"
                    hx-confirm="Remove {{ repo.full_name }}?">
                &#10005;
            </button>
        </li>
    {% empty %}
        <li class="repo-empty">No repositories tracked yet.</li>
    {% endfor %}
</ul>
