{% load dashboard_tags %}

<div class="tab-navigation">
    <a href="{% if current_repo %}{% url 'dashboard:repo_pr_list' current_repo.owner current_repo.name %}{% else %}{% url 'dashboard:pr_list' %}{% endif %}"
       class="tab {% if active_tab == 'open' %}active{% endif %}"
       hx-get="{% if current_repo %}{% url 'dashboard:repo_pr_list' current_repo.owner current_repo.name %}{% else %}{% url 'dashboard:pr_list' %}{% endif %}"
       hx-target="#pr-content"
       hx-swap="innerHTML"
       hx-push-url="true">
        Open
    </a>
    <a href="{% if current_repo %}{% url 'dashboard:repo_merged_pr_list' current_repo.owner current_repo.name %}{% else %}{% url 'dashboard:merged_pr_list' %}{% endif %}"
       class="tab {% if active_tab == 'merged' %}active{% endif %}"
       hx-get="{% if current_repo %}{% url 'dashboard:repo_merged_pr_list' current_repo.owner current_repo.name %}{% else %}{% url 'dashboard:merged_pr_list' %}{% endif %}"
       hx-target="#pr-content"
       hx-swap="innerHTML"
       hx-push-url="true">
        Merged
    </a>
</div>

{% include 'dashboard/partials/_pr_list.html' %}
