{% load dashboard_tags %}

<div class="pr-toolbar">
    <div class="tab-navigation">
        <a href="{% if current_repo %}{% url 'dashboard:repo_pr_list' current_repo.owner current_repo.name %}{% else %}{% url 'dashboard:pr_list' %}{% endif %}{% if author %}?author={{ author }}{% endif %}"
           class="tab {% if active_tab == 'open' %}active{% endif %}"
           hx-get="{% if current_repo %}{% url 'dashboard:repo_pr_list' current_repo.owner current_repo.name %}{% else %}{% url 'dashboard:pr_list' %}{% endif %}{% if author %}?author={{ author }}{% endif %}"
           hx-target="#pr-content"
           hx-swap="innerHTML"
           hx-push-url="true">
            Open
        </a>
        <a href="{% if current_repo %}{% url 'dashboard:repo_merged_pr_list' current_repo.owner current_repo.name %}{% else %}{% url 'dashboard:merged_pr_list' %}{% endif %}{% if author %}?author={{ author }}{% endif %}"
           class="tab {% if active_tab == 'merged' %}active{% endif %}"
           hx-get="{% if current_repo %}{% url 'dashboard:repo_merged_pr_list' current_repo.owner current_repo.name %}{% else %}{% url 'dashboard:merged_pr_list' %}{% endif %}{% if author %}?author={{ author }}{% endif %}"
           hx-target="#pr-content"
           hx-swap="innerHTML"
           hx-push-url="true">
            Merged
        </a>
    </div>

    <form class="author-filter-form"
          hx-get="{% if current_repo %}{% if active_tab == 'merged' %}{% url 'dashboard:repo_merged_pr_list' current_repo.owner current_repo.name %}{% else %}{% url 'dashboard:repo_pr_list' current_repo.owner current_repo.name %}{% endif %}{% else %}{% if active_tab == 'merged' %}{% url 'dashboard:merged_pr_list' %}{% else %}{% url 'dashboard:pr_list' %}{% endif %}{% endif %}"
          hx-target="#pr-content"
          hx-swap="innerHTML"
          hx-push-url="true"
          hx-indicator="#refresh-spinner">
        <label for="author-input">Author:</label>
        <input type="text"
               id="author-input"
               name="author"
               value="{{ author|default:'' }}"
               placeholder="{{ current_username|default:'me' }}"
               class="input input-small">
        <button type="submit" class="btn btn-secondary btn-small">Filter</button>
        {% if author %}
            <a href="{% if current_repo %}{% if active_tab == 'merged' %}{% url 'dashboard:repo_merged_pr_list' current_repo.owner current_repo.name %}{% else %}{% url 'dashboard:repo_pr_list' current_repo.owner current_repo.name %}{% endif %}{% else %}{% if active_tab == 'merged' %}{% url 'dashboard:merged_pr_list' %}{% else %}{% url 'dashboard:pr_list' %}{% endif %}{% endif %}"
               class="btn btn-secondary btn-small"
               hx-get="{% if current_repo %}{% if active_tab == 'merged' %}{% url 'dashboard:repo_merged_pr_list' current_repo.owner current_repo.name %}{% else %}{% url 'dashboard:repo_pr_list' current_repo.owner current_repo.name %}{% endif %}{% else %}{% if active_tab == 'merged' %}{% url 'dashboard:merged_pr_list' %}{% else %}{% url 'dashboard:pr_list' %}{% endif %}{% endif %}"
               hx-target="#pr-content"
               hx-swap="innerHTML"
               hx-push-url="true"
               hx-indicator="#refresh-spinner">Clear</a>
        {% endif %}
    </form>
</div>

{% include 'dashboard/partials/_pr_list.html' %}
