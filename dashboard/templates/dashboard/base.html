<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PR Dashboard{% endblock %}</title>
    {% load static %}
    {% load socialaccount %}
    <link rel="stylesheet" href="{% static 'dashboard/css/styles.css' %}">
    <script src="{% static 'dashboard/js/htmx.min.js' %}" defer></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="{% url 'dashboard:home' %}" class="logo">PR Dashboard</a>
            <div class="header-actions">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <span class="theme-icon-light">&#9728;</span>
                    <span class="theme-icon-dark">&#9790;</span>
                </button>
                {% if user.is_authenticated %}
                    <span class="user-info">{{ user.username }}</span>
                    <a href="{% url 'account_logout' %}" class="btn btn-secondary">Logout</a>
                {% else %}
                    <a href="{% provider_login_url 'github' %}" class="btn btn-primary">Login with GitHub</a>
                {% endif %}
            </div>
        </div>
    </header>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script>
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;

            container.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 10);

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 5000);

            toast.addEventListener('click', () => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            });
        }

        function copyBranchName(branchName) {
            navigator.clipboard.writeText(branchName).then(() => {
                showToast('Branch name copied!', 'success');
            }).catch((err) => {
                showToast('Failed to copy branch name', 'error');
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Theme toggle functionality
            const html = document.documentElement;
            const themeToggle = document.getElementById('theme-toggle');

            // Load saved theme or default to light
            const savedTheme = localStorage.getItem('theme') || 'light';
            html.setAttribute('data-theme', savedTheme);

            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const currentTheme = html.getAttribute('data-theme');
                    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                    html.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                });
            }

            // HTMX swap fix: ensure content stays after swap
            document.body.addEventListener('htmx:afterSwap', function(evt) {
                if (evt.detail.target.innerHTML.length === 0 && evt.detail.xhr) {
                    evt.detail.target.innerHTML = evt.detail.xhr.responseText;
                }
            });

            document.body.addEventListener('showErrors', function(evt) {
                const errors = evt.detail.value || evt.detail;
                if (Array.isArray(errors)) {
                    errors.forEach(error => showToast(error, 'error'));
                }
            });

            document.body.addEventListener('tabChanged', function(evt) {
                const activeTab = evt.detail.value || evt.detail;
                const sidebarLinks = document.querySelectorAll('.sidebar-link[data-tab]');
                sidebarLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.dataset.tab === activeTab) {
                        link.classList.add('active');
                    }
                });
            });

            let isRefreshInProgress = false;

            document.body.addEventListener('htmx:beforeRequest', function(evt) {
                const target = evt.detail.target;
                if (target && target.id === 'pr-content') {
                    isRefreshInProgress = true;
                }
            });

            document.body.addEventListener('htmx:afterRequest', function(evt) {
                const target = evt.detail.target;
                if (target && target.id === 'pr-content') {
                    isRefreshInProgress = false;
                }
            });

            document.addEventListener('keydown', function(evt) {
                if (evt.target.tagName === 'INPUT' || evt.target.tagName === 'TEXTAREA') {
                    return;
                }
                if (evt.ctrlKey || evt.metaKey) {
                    return;
                }
                if (evt.key === 'r' || evt.key === 'R') {
                    if (isRefreshInProgress) {
                        return;
                    }
                    const refreshBtn = document.querySelector('.refresh-wrapper button');
                    if (refreshBtn) {
                        refreshBtn.click();
                    }
                }
            });
        });
    </script>
</body>
</html>
